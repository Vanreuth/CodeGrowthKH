# backend/render.yaml

services:
  - type: web
    name: backend
    runtime: docker

    # ⚠️ Key for monorepo — point to backend subfolder
    dockerfilePath: ./backend/Dockerfile
    rootDir: ./backend

    region: singapore
    plan: free
    branch: main

    # Only rebuild when backend files change
    # Ignores frontend changes ✅
    buildFilter:
      paths:
        - backend/src/**
        - backend/pom.xml
        - backend/Dockerfile
        - backend/render.yaml

    healthCheckPath: /actuator/health
    autoDeploy: true

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_POOL_SIZE
        value: "3"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: OAUTH2_REDIRECT_URI
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_REGION
        value: auto
      - key: MAX_FILE_SIZE
        value: 10MB
      - key: MAX_REQUEST_SIZE
        value: 20MB
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: None
      - key: LOG_LEVEL_ROOT
        value: WARN
      - key: LOG_LEVEL_APP
        value: INFO