databases:
  - name: codegrowthkh-db
    databaseName: codegrowthkh
    region: singapore
    plan: free

services:
  - type: web
    name: codegrowthkh
    runtime: docker
    rootDir: ./backend
    dockerfilePath: ./Dockerfile 
    region: singapore
    plan: free
    branch: main

    buildFilter:
      paths:
        - backend/src/**
        - backend/pom.xml
        - backend/Dockerfile

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: DB_HOST
        fromDatabase:
          name: codegrowthkh-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: codegrowthkh-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: codegrowthkh-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: codegrowthkh-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: codegrowthkh-db
          property: password

      - key: DB_POOL_SIZE
        value: "3"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate

      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"

      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: OAUTH2_REDIRECT_URI
        sync: false

      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_REGION
        value: auto

      - key: MAX_FILE_SIZE
        value: 10MB
      - key: MAX_REQUEST_SIZE
        value: 20MB
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: LOG_LEVEL_ROOT
        value: WARN
      - key: LOG_LEVEL_APP
        value: INFO
